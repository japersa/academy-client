# Ejemplo de Nginx delante del dominio de la app (mismo host para SPA + API + WebSockets).
# Vercel solo reescribe HTTP; no es un proxy WebSocket fiable a Heroku. Si quieres que
# wss://app.tudominio/api/ws/... funcione sin exponer *.herokuapp.com en el cliente,
# coloca Nginx (o Caddy/Traefik) como entrada pública y:
#   - /api/  → Heroku (cabeceras Upgrade/Connection para WS)
#   - /      → origen del SPA (p. ej. despliegue en Vercel u otro static)
#
# Pasos típicos:
# 1) DNS de app.tudominio → IP del VPS con este Nginx (o balanceador).
# 2) Ajusta server_name, rutas ssl_certificate, y el upstream de Heroku.
# 3) En environment.prod.ts deja websocketPublicOrigin vacío (mismo dominio que el SPA).
# 4) Si / ya lo sirve Vercel por otro canal, puedes proxy_pass al host *.vercel.app
#    que te indique el proyecto, con proxy_ssl_server_name y Host correctos.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream backend_heroku {
  # Sustituye por tu app Heroku (sin https://)
  server ultra-back-98fc6bf42dce.herokuapp.com:443;
}

