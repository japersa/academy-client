<div class="content">
  <div class="row">
    <div class="col-6">
      <ol class="breadcrumb bg-transparent ml-3">
        <li class="breadcrumb-item text-primary">
          <a routerLink="/dashboard"> Dashboard </a>
        </li>
        <li class="breadcrumb-item">Solicitud de paquetes</li>
      </ol>
    </div>
    <div class="col-6">
      <label for="selectStatus">Status</label>
      <select class="form-control" id="selectStatus">
        <option>Cualquiera</option>
        <option>Completo</option>
        <option>Pendiente</option>
        <option>Cancelado</option>
      </select>
    </div>
  </div>

  <div *ngFor="let i of packages" class="row">
    <div class="col-md-8">
      <div class="col-lg-12 col-md-12">
        <div class="card card-stats">
          <div class="card-body">
            <div class="row">
              <div class="col-4">
                <p>
                  <strong>Nombre:</strong>
                  {{ i.first_name + " " + i.last_name | titlecase }}
                </p>
                <p>
                  <strong>Moneda:</strong>
                  {{ i.currencies | uppercase }}
                </p>
                <p>
                  <strong>Balance:</strong>
                  {{ i.balance }}
                </p>
                <p>
                  <strong>Plataforma:</strong>
                  MT5
                </p>
              </div>
              <div class="col-4">
                <p>
                  <strong>Status:</strong>
                  {{ i.status }}
                </p>
                <p>
                  <strong>Fecha de solicitud:</strong>
                  {{ i.end_date | date }}
                </p>
              </div>
              <div class="col-4">
                <button class="btn btn-secondary btn-lg mb-3">Comprar</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
