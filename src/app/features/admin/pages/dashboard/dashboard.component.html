<div class="content admin-area-page dashboard-page">
  <div class="row admin-area-breadcrumb-row">
    <div class="col-12">
      <nav aria-label="Migas de pan">
        <ol class="breadcrumb bg-transparent mb-0 px-0">
          <li class="breadcrumb-item text-primary">
            <a routerLink="/dashboard">Dashboard</a>
          </li>
          <li class="breadcrumb-item active" aria-current="page">Inicio</li>
        </ol>
      </nav>
    </div>
  </div>

  <!-- Gráfico nuevos usuarios (cabecera alineada al patrón card-header + tools del resto de admin) -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="card card-chart dashboard-page__chart-card">
        <div class="card-header">
          <div class="tools float-right mt-1">
            <a
              class="btn btn-primary btn-sm d-inline-block"
              routerLink="/users/user"
            >
              Registrar usuario
            </a>
          </div>
          <h5 class="card-category mb-1">Nuevos</h5>
          <h4 class="card-title title-table mb-0">Usuarios</h4>
        </div>
        <div class="card-body pt-2">
          <div class="chart-area dashboard-page__chart-area">
            <canvas id="MyChart" aria-label="Gráfico de usuarios registrados por mes"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tarjetas de estadísticas -->
  <div class="row dashboard-page__stats">
    <div class="col-12 col-sm-6 col-lg-3 mb-3 mb-lg-0">
      <div class="card card-stats h-100 dashboard-page__stat-card">
        <div class="card-body">
          <div class="row align-items-center no-gutters">
            <div class="col-auto pr-3">
              <div class="info-icon text-center icon-white">
                <img
                  src="https://res.cloudinary.com/ddw7odxzr/image/upload/v1697319529/icono-2_d0us2t.png"
                  alt=""
                  width="80"
                  height="80"
                />
              </div>
            </div>
            <div class="col">
              <div class="numbers">
                <p class="card-category mb-1">Estudiantes totales</p>
                <h3 class="card-title mb-0">{{ total_students }}</h3>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-sm-6 col-lg-3 mb-3 mb-lg-0">
      <div class="card card-stats h-100 dashboard-page__stat-card">
        <div class="card-body">
          <div class="row align-items-center no-gutters">
            <div class="col-auto pr-3">
              <div class="info-icon text-center icon-white">
                <img
                  src="https://res.cloudinary.com/ddw7odxzr/image/upload/v1697668295/icono-6_c2xee7.png"
                  alt=""
                  width="80"
                  height="80"
                />
              </div>
            </div>
            <div class="col">
              <div class="numbers">
                <p class="card-category mb-1">Suscriptores</p>
                <h3 class="card-title mb-0">{{ total_students }}</h3>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-sm-6 col-lg-3 mb-3 mb-lg-0">
      <div class="card card-stats h-100 dashboard-page__stat-card">
        <div class="card-body">
          <div class="row align-items-center no-gutters">
            <div class="col-auto pr-3">
              <div class="info-icon text-center icon-white">
                <img
                  src="https://res.cloudinary.com/ddw7odxzr/image/upload/v1697319529/icono-3_hj9ovs.png"
                  alt=""
                  width="80"
                  height="80"
                />
              </div>
            </div>
            <div class="col">
              <div class="numbers">
                <p class="card-category mb-1">Tutores registrados</p>
                <h3 class="card-title mb-0">{{ total_teachers }}</h3>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card card-stats bg-black h-100 dashboard-page__stat-card">
        <div class="card-body">
          <div class="row align-items-center no-gutters">
            <div class="col-auto pr-3">
              <div class="info-icon text-center icon-white">
                <img
                  src="https://res.cloudinary.com/ddw7odxzr/image/upload/v1697319529/icono-4_c8ducj.png"
                  alt=""
                  width="80"
                  height="80"
                />
              </div>
            </div>
            <div class="col">
              <div class="numbers">
                <p class="card-category mb-1">Administradores</p>
                <h3 class="card-title mb-0">{{ total_admins }}</h3>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Cursos (mismo patrón card que Users / Packages) -->
  <div class="row dashboard-page__courses-section">
    <div class="col-12">
      <div class="card dashboard-page__courses-card">
        <div class="card-header">
          <div class="tools float-right">
            <a
              class="btn btn-primary btn-sm d-inline-block"
              routerLink="/course-by-steps"
              type="button"
            >
              Crear curso
            </a>
          </div>
          <h4 class="card-title title-table mb-0">Cursos</h4>
        </div>
        <div class="card-body pt-3">
          <div class="row dashboard-page__courses">
            <div *ngFor="let c of courses" class="col-12 col-sm-6 col-lg-4 col-xl-3 mb-4">
              <div class="card dashboard-page__course-card h-100">
                <img
                  class="card-img-top dashboard-page__course-img"
                  [src]="c?.path_preview_image"
                  alt=""
                />
                <div class="card-body d-flex flex-column">
                  <h5 class="card-title text-center dashboard-page__course-title">
                    {{ (c?.title || '—') | uppercase }}
                  </h5>
                  <ng-container *ngIf="courseCardDescription(c) as desc">
                    <p class="small text-muted text-center mb-2 dashboard-page__course-desc">
                      {{ desc }}
                    </p>
                  </ng-container>
                  <button
                    class="btn btn-secondary btn-block mt-auto"
                    type="button"
                    (click)="goToCourseDetail(c.id)"
                  >
                    Ir al curso
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
