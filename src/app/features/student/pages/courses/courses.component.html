<div class="content admin-area-page" [ngClass]="{'class-user' : userDataService?.userData$?.value?.rol === 'student'}">
    <div class="row admin-area-breadcrumb-row">
        <div class="col-12">
            <nav aria-label="Migas de pan">
                <ol class="breadcrumb bg-transparent mb-0 px-0">
                    <li class="breadcrumb-item text-primary">
                        <a routerLink="/referrals">Back office</a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page">Curso</li>
                </ol>
            </nav>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <div class="headings d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                <h2 class="title m-0">{{ course?.title | uppercase}}</h2>
                <button type="button" class="btn btn-primary" [routerLink]="['/test', courseId]">
                    Presentar exámen
                </button>
            </div>

            <div class="row">
                <div class="col-lg-6 col-md-6 col-sm-12">
                    <section class="course-module mb-4" *ngFor="let module of course.modules || []">
                        <h3 class="course-module__title">{{ module?.name | titlecase }}</h3>
                        <p class="course-module__empty small mb-0" *ngIf="!module?.topics?.length">Este módulo aún no tiene temas.</p>
                        <div class="card course-timeline-card border-0 shadow-sm" *ngIf="module?.topics?.length > 0">
                            <div class="card-body p-0">
                                <ul class="course-timeline" role="list" [attr.aria-label]="'Temas del módulo ' + (module?.name || '')">
                                    <li
                                        *ngFor="let topic of module.topics; let idx = index"
                                        class="course-timeline__item"
                                        [class.course-timeline__item--seen]="topic.seen"
                                        [class.course-timeline__item--pending]="!topic.seen"
                                    >
                                        <span class="course-timeline__marker" aria-hidden="true"></span>
                                        <button
                                            type="button"
                                            class="course-timeline__btn"
                                            (click)="goToTopicDetail(topic.id)"
                                            [attr.aria-label]="(topic.seen ? 'Abrir tema visto: ' : 'Abrir tema: ') + (topic?.title || '')"
                                        >
                                            <span class="course-timeline__index">{{ idx + 1 }}</span>
                                            <span class="course-timeline__body">
                                                <span class="course-timeline__heading">{{ topic?.title | titlecase }}</span>
                                                <span class="course-timeline__status" *ngIf="topic.seen">Completado</span>
                                                <span class="course-timeline__status course-timeline__status--pending" *ngIf="!topic.seen">Pendiente</span>
                                            </span>
                                            <span class="course-timeline__chevron" aria-hidden="true"></span>
                                        </button>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="col-lg-6 col-md-6 col-sm-12">
                    <div class="course-preview sticky-lg-top" style="top: 5.5rem;">
                        <img
                            [src]="course?.path_preview_image"
                            class="img-fluid rounded shadow-sm w-100 course-preview__img"
                            [alt]="'Imagen del curso ' + (course?.title || '')"
                            loading="lazy"
                        />
                        <p class="mt-3 mb-0 text-muted course-preview__desc">{{ course?.description }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
