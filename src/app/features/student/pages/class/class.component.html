<div class=" content">
    <div class=" row">
        <ol class=" breadcrumb bg-transparent ml-3">
            <li class=" breadcrumb-item text-primary">Curso</li>
            <li class=" breadcrumb-item active">Un curso</li>
        </ol>
        <div class="col-12">
            <app-course-navbar></app-course-navbar>

            <div class="container">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-8 col-lg-8">
                        <div class="video-player-wrapper">
                            <!-- <h2>Angular Video Player with Controls Example</h2> -->
                            <vg-player *ngIf="source">
                                <vg-overlay-play></vg-overlay-play>
                                <vg-buffering></vg-buffering>
                                <vg-scrub-bar>
                                    <vg-scrub-bar-current-time></vg-scrub-bar-current-time>
                                    <vg-scrub-bar-buffering-time></vg-scrub-bar-buffering-time>
                                </vg-scrub-bar>
                                <vg-controls>
                                    <vg-play-pause></vg-play-pause>
                                    <vg-playback-button></vg-playback-button>
                                    <vg-time-display vgProperty="current" vgFormat="mm:ss"></vg-time-display>
                                    <vg-scrub-bar style="pointer-events: none;"></vg-scrub-bar>
                                    <vg-time-display vgProperty="left" vgFormat="mm:ss"></vg-time-display>
                                    <vg-time-display vgProperty="total" vgFormat="mm:ss"></vg-time-display>
                                    <vg-track-selector></vg-track-selector>
                                    <vg-mute></vg-mute>
                                    <vg-volume></vg-volume>
                                    <vg-fullscreen></vg-fullscreen>
                                </vg-controls>
                                <video [vgMedia]="$any(media)" #media id="singleVideo" preload="auto" crossorigin>
                                    <source [src]="source">
                                    <!-- <source src="http://static.videogular.com/assets/videos/videogular.ogg" type="video/ogg">
                                <source [src]="source" type="video/mp4">  -->
                                    <track kind="subtitles" label="English"
                                        src="http://static.videogular.com/assets/subs/pale-blue-dot.vtt" srclang="en"
                                        default>
                                    <track kind="subtitles" label="Español"
                                        src="http://static.videogular.com/assets/subs/pale-blue-dot-es.vtt"
                                        srclang="es">
                                </video>
                            </vg-player>
                        </div>
                    </div>
                    <div class="col-xs-12 col-sm-12 col-md-4 col-lg-4">
                        <app-topic-comments></app-topic-comments>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
