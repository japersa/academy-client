<div class="full-page lock-page">
  <div class=" content">
    <div class=" container">
      <div class="row">
        <div class=" col-lg-6 col-md-6 ml-auto mr-auto container-form">
            <form 
              class="form" 
              [formGroup]="form" 
              (ngSubmit)="recoverUser(form.value)" 
              role="form"
            >
            <div class="card card-lock card-white shadow-none">
              <div class="card-header card-header-bottom pb-1 mt-2">
                <h3
                 class="card-title">
                  Recuperar Contraseña
                </h3> 
                <p class="card-text  mb-5 ">
                  Ingresa el correo y restablece la contraseña
                </p>
              </div>
              <div class=" card-body">
                <div class="form-group text-left mt-5">
                  <label for="email"
                    >Email: {{emailField?.value | lowercase}} </label
                  >
                  <input 
                    type="email" 
                    class="form-control rounded-pill " 
                    formControlName="email"  
                    placeholder="Escriba su email"
                    id="email"
                  >
                  <ng-container 
                    *ngFor="
                      let validation of validationMessages
                        .email
                    "
                  >
                    <small 
                      class="form-text text-danger" 
                      *ngIf="
                        emailField?.hasError(validation.type) &&
                        emailFieldDirty 
                      "
                    >
                      {{validation.message}}
                    </small>
                  </ng-container>
                </div>
                <ng-container 
                  *ngIf="errorMessage"
                >
                  <small 
                    class="text-danger d-block" 
                    *ngFor="let e of errorMessage | keyvalue"
                  >
                    {{e.value}}
                  </small> <br>
                </ng-container>
              </div>
              <div class=" card-footer">
                <button 
                  class=" 
                    btn btn-secundary btn-lg
                    btn-block mb-3 rounded-pill
                  " 
                  [disabled]="form.invalid" 
                  type="submit"
                > 
                  Restablecer contraseña 
                </button>
                <h6>
                  <a class=" link footer-link" routerLink="/sign-up">
                    ¿No tienes una cuenta? <strong>Crear una cuenta Aquí</strong>
                  </a>
                </h6>
              </div>
            </div>
            </form>
        </div>
        <div class="col-lg-6 col-md-6 img" >
          
        </div>
      </div>
    </div>
  </div>
</div>
