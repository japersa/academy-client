<div class="full-page forget-password-page">
  <div class=" content">
    <div class=" container">
      <div class=" col-lg-4 col-md-6 ml-auto mr-auto">
        <div class=" card card-lock card-white text-center">
          <div class=" card-body">
            <h4 class=" card-title">¿Has olvidado tu contraseña?</h4>
              <form class="form" [formGroup]="registerForm" (ngSubmit)="recoverUser(registerForm.value)" role="form">

                <div class=" input-group" [ngClass]="{ 'input-group-focus': focus === true }">
                  <div class=" input-group-prepend">
                    <div class=" input-group-text">
                      <i class=" tim-icons icon-email-85"> </i>
                    </div>
                  </div>
                  <input class=" form-control" formControlName="email" placeholder="Email" type="text"
                    (blur)="focus = false" (focus)="focus = true" />
                </div>

                <ng-container *ngFor="let validation of validationMessages.email">
                  <small class="text-danger" *ngIf="registerForm.get('email').hasError(validation.type) &&
                  (registerForm.get('email').dirty || registerForm.get('email').touched) ">
                    {{validation.message}}
                  </small>
                </ng-container>
                <ng-container *ngIf="errorMessage">
                  <small class="text-danger" *ngFor="let e of errorMessage | keyvalue">{{e.value}}</small> <br>
                </ng-container>
              </form>
            </div>
          <div class=" card-footer">
                  <button class=" btn btn-primary btn-round btn-lg" [disabled]="registerForm.invalid" type="submit" >
                    Restaurar contraseña
                  </button>
                </div>
        </div>
      </div>
    </div>
  </div>
</div>
