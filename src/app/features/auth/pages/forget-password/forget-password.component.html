<div class="full-page lock-page">
  <div class=" content">
    <div class=" container">
      <div class="row">
        <div class=" col-lg-4 col-md-6 ml-auto mr-auto">
          <div class=" card card-lock card-white text-center">
            <form class="form" [formGroup]="form" (ngSubmit)="recoverUser(form.value)" role="form">
          <!--   <div class=" card-header">
              <img alt="..." src="assets/img/emilyz.jpg" />
            </div> -->
              <div class=" card-body">
                <h3 class=" card-title">¿Has olvidado tu contraseña?</h3>
                <h6 class=" card-title">Escribenos tu correo y te enviaremos un código de verificación</h6>
                <div class="form-group text-left">
                  <label for="exampleInputEmail1">Email</label>
                  <input type="email" class="form-control" formControlName="email" placeholder="Email" 
                    placeholder="Escriba su email">
                  <ng-container *ngFor="let validation of validationMessages.email">
                    <small class="form-text text-danger" *ngIf="email.hasError(validation.type) &&
                            (email.dirty || email.touched) ">
                      {{validation.message}}
                    </small>
                  </ng-container>
                </div>
                <ng-container *ngIf="errorMessage">
                  <small class="text-danger d-block" *ngFor="let e of errorMessage | keyvalue">{{e.value}}</small> <br>
                </ng-container>
              </div>
              <div class=" card-footer">
                <button class=" btn btn-primary btn-lg" [disabled]="form.invalid" type="submit">
                  Restaurar contraseña
                </button>
                <h6>
                  <a class=" link footer-link" routerLink="/sign-up">
                    ¿No tienes una cuenta? <strong>Crear una cuenta Aquí</strong>
                  </a>
                </h6>
              </div>
             <!--  <div class=" pull-left">
                <h6>
                  <a class=" link footer-link" routerLink="/sign-up">
                    ¿No tienes una cuenta? <strong>Crear una cuenta Aquí</strong>
                  </a>
                </h6>
              </div> -->
            </form>
          </div>
        </div>
        <div class="col-lg-8 col-md-6 img" >
          
        </div>
      </div>
    </div>
  </div>
</div>
