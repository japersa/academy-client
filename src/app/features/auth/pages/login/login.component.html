<div class="full-page login-page">
  <div class="row">
    <div class="col-lg-5 mr-auto container-form">
      <div class="card card-login card-white shadow-none">
        <div class="card-header pb-1 mt-4 pl-5 pr-5 text-center">
          <div class="mx-auto my-auto logo">
            <img src="https://res.cloudinary.com/ddw7odxzr/image/upload/v1719765038/RC_11326_Logo_Final_Start_Academy_Alex_Logotipo_Negativo_ku9htb.png" alt="Logo"
              style="width:220px !important;" />
          </div>
          <h1 class="card-title">Login</h1>
        </div>
        <div class="card-body">
          <p class="card-text text-center" *ngIf="!awaiting2fa">
            Ingresa al dashboard y entérate de todo lo que podrías hacer.
          </p>
          <p class="card-text text-center" *ngIf="awaiting2fa">
            Introduce el código de 6 dígitos de tu app de autenticación (Google Authenticator, etc.).
          </p>
          <form class="form" [formGroup]="form" (ngSubmit)="loginUser(form.value)" role="form">
            <div class="form-group">
              <label for="email">Email: {{ emailField?.value | lowercase }}
              </label>
              <input type="email" class="form-control rounded-pill shadow" formControlName="email"
                [attr.readonly]="awaiting2fa ? true : null"
                aria-describedby="emailHelp" placeholder="Escriba su email" id="email" />
              <ng-container *ngFor="let validation of validationMessages.email">
                <small class="form-text text-danger" *ngIf="
                    emailField?.hasError(validation.type) && emailFieldDirty
                  ">
                  {{ validation.message }}
                </small>
              </ng-container>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input class="form-control rounded-pill shadow" formControlName="password" placeholder="Contraseña"
                [attr.readonly]="awaiting2fa ? true : null"
                id="password" type="password" aria-describedby="password" />
              <ng-container *ngFor="let validation of validationMessages.password">
                <small class="form-text text-danger" *ngIf="
                    passwordField?.hasError(validation.type) &&
                    passwordFieldDirty
                  ">
                  {{ validation.message }}
                </small>
              </ng-container>
            </div>

            <div class="form-group" *ngIf="awaiting2fa">
              <label for="otp">Código de verificación</label>
              <input class="form-control rounded-pill shadow" id="otp" name="otp" type="text" inputmode="numeric"
                autocomplete="one-time-code" maxlength="12" placeholder="000000"
                [(ngModel)]="twoFactorCode" [ngModelOptions]="{standalone: true}" />
            </div>

            <small *ngIf="errorMessage" class="text-danger d-block">{{ errorMessage }}</small>
            <div class="card-footer">
              <div class="pull-right">
                <h6 class="mt-1">
                  <a class="link footer-link" routerLink="/forget-password">
                    ¿Restablecer contraseña?
                  </a>
                </h6>
              </div>
              <button class="btn btn-secondary btn-lg btn-block mb-3 rounded-pill"
                [disabled]="loginPending || (!awaiting2fa && form.invalid) || (awaiting2fa && !twoFactorCode?.trim())"
                type="submit">
                {{ loginPending ? (awaiting2fa ? 'Verificando…' : 'Entrando…') : (awaiting2fa ? 'Verificar código' : 'Iniciar sesión') }}
              </button>
              <button *ngIf="awaiting2fa" type="button" class="btn btn-link btn-block mb-2" (click)="cancel2fa()">
                Volver al inicio de sesión
              </button>
              <div class="pull-left">
                <h6>
                  <a class="link footer-link" routerLink="/sign-up">
                    ¿No tienes una cuenta?
                    <strong> Crear una cuenta Aquí </strong>
                  </a>
                </h6>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div class="col-lg-7 d-flex">
      <img
        src="https://res.cloudinary.com/ddw7odxzr/image/upload/v1729784806/Disen%CC%83o_sin_ti%CC%81tulo_6_rhmi8k.jpg"
        alt="" />
    </div>
  </div>
</div>
