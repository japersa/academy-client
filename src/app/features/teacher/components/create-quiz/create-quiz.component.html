<div class=" card text-left">
    <form [formGroup]="quizForm" (ngSubmit)="createQuiz(quizForm.value)" role="form">
        <div class=" card-header">
            <h4 class=" card-title">Crear exámen</h4>
        </div>
        <div class=" card-body col-md-6">
            <label> Pregunta </label>
            <div class=" form-group">
                <input class=" form-control" formControlName="title" placeholder="Título" type="text" required />
            </div>
            <ng-container *ngFor="let validation of validationMessages.title">
                <small class="text-danger d-block" *ngIf="createUserForm.get('title').hasError(validation.type) &&
                            (createUserForm.get('title').dirty || createUserForm.get('title').touched) ">
                    {{validation.message}}
                </small>
            </ng-container>
            <label> Descripción </label>
            <div class=" form-group">

                <textarea class="form-control" formControlName="description" placeholder="Descripción" rows="3"
                    required></textarea>

            </div>
            <ng-container *ngFor="let validation of validationMessages.description">
                <small class="text-danger d-block" *ngIf="createUserForm.get('description').hasError(validation.type) &&
                            (createUserForm.get('description').dirty || createUserForm.get('description').touched) ">
                    {{validation.message}}
                </small>
            </ng-container>
            <label> Precio </label>
            <div class=" form-group">
                <input class=" form-control" formControlName="price" placeholder="Precio" type="number" required />
            </div>
            <ng-container *ngFor="let validation of validationMessages.price">
                <small class="text-danger d-block" *ngIf="createUserForm.get('price').hasError(validation.type) &&
                            (createUserForm.get('price').dirty || createUserForm.get('price').touched) ">
                    {{validation.message}}
                </small>
            </ng-container>


            <!-- <ng-container *ngIf="firebaseStorageService.uploadPercent">
                <div class=" progress-container">
                    <span class=" progress-badge"> Subiendo </span>
                    <div class=" progress">
                        <progressbar [value]="firebaseStorageService.uploadPercent | async">
                            <span class=" progress-value"> {{firebaseStorageService.uploadPercent | async}} </span>
                        </progressbar>
                    </div>
                </div>
            </ng-container> -->


            <ng-container *ngIf="errorMessage">
                <small class="text-danger" *ngFor="let e of errorMessage | keyvalue">{{e.value}}</small> <br>
            </ng-container>

        </div>
        <div class=" card-footer">
            <button class=" btn btn-fill btn-primary" [disabled]="quizForm.invalid" type="submit">
                Enviar
            </button>
        </div>
    </form>
</div>
