<div
  class="content admin-area-page live-signals-page"
  [ngClass]="{
    'class-user': userDataService?.userData$?.value?.rol === 'user'
  }"
>
  <div class="row admin-area-breadcrumb-row">
    <div class="col-12">
      <nav aria-label="Migas de pan">
        <ol class="breadcrumb bg-transparent mb-0 px-0">
          <li class="breadcrumb-item text-primary">
            <a routerLink="/referrals">Back office</a>
          </li>
          <li class="breadcrumb-item active" aria-current="page">Señal en vivo</li>
        </ol>
      </nav>
    </div>
  </div>

  <div class="row live-signals-page__layout g-4">
    <div class="col-12 live-signals-page__main">
      <div *ngIf="loading" class="card live-signals-page__card border-0 shadow-sm">
        <div class="card-body py-5 text-center">
          <p class="text-muted mb-0">Cargando…</p>
        </div>
      </div>

      <ng-container *ngIf="!loading && status?.active && safeEmbedUrl">
        <div class="card live-signals-page__card border-0 shadow-sm">
          <div class="live-signals-page__head">
            <span class="live-signals-page__eyebrow">En directo</span>
            <h4 class="live-signals-page__title mb-0">
              <span class="live-signals__dot" aria-hidden="true"></span>
              {{ status?.title || 'Señal en vivo' }}
            </h4>
          </div>
          <div class="live-signals-page__shell">
            <div class="live-signals__embed">
              <iframe
                [src]="safeEmbedUrl"
                title="Transmisión en vivo"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
              ></iframe>
            </div>
          </div>
        </div>
      </ng-container>

      <div *ngIf="!loading && !status?.active" class="card live-signals-page__card border-0 shadow-sm">
        <div class="live-signals-page__head">
          <span class="live-signals-page__eyebrow">Academia</span>
          <h4 class="live-signals-page__title mb-0">Señal en vivo</h4>
        </div>
        <div class="card-body live-signals-page__empty-body">
          <p class="text-muted mb-0 text-center">
            No hay una señal en vivo activa o no tienes permiso para verla.
            Cuando el equipo active la sesión, podrás seguirla desde aquí.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
