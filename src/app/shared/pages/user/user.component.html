<div class="content">
  <div class="row">
    <div class="col-md-8">
      <div class="card">
        <div class="card-header"><h5 class="title">Editar perfil</h5></div>
        <div class="card-body">
          <form>
            <div class="row">
              <div class="col-md-6 pr-md-1">
                <div class="form-group">
                  <label> Nombre </label>
                  <input
                    class="form-control"
                    type="text"
                    placeholder="Nombre"
                    [value] = "userDataService?.userData$?.value?.first_name"
                    [formControl] ="first_name"
                  />
                </div>
              </div>
              <div class="col-md-6 pl-md-1">
                <div class="form-group">
                  <label> Apellido </label>
                  <input
                    class="form-control"
                    type="text"
                    placeholder="Apellido" [formControl] ="last_name"
                    value = "this.registerForm.value.last_name"
                  />
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 pr-md-1">
                <div class="form-group">
                  <label> Dirección de Email </label>
                  <input
                    class="form-control"
                    placeholder="Email" [formControl] ="username"
                    value="a@a.com"
                  />
                </div>
              </div>
              <div class="col-md-6 pl-md-1">
                <div class="form-group">
                  <label> Teléfono </label>
                  <input
                    class="form-control"
                    placeholder="Teléfono" [formControl] ="phone"
                  />
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="card-footer">
          <button class="btn btn-fill btn-danger" type="submit">Guardar</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <h5 class="title">Actualizar contraseña</h5>
        </div>
        <div class="card-body">
          <form>
            <div class="row">
              <div class="col-md-6 pr-md-1">
                <div class="form-group">
                  <label> Contraseña actual </label>
                  <input
                    class="form-control"
                    type="text"
                    placeholder="Contraseña actual"
                  />
                </div>
              </div>
              <div class="col-md-6 pl-md-1">
                <div class="form-group">
                  <label> Nueva contraseña </label>
                  <input
                    class="form-control"
                    type="text"
                    placeholder="Nueva contraseña"
                  />
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="card-footer">
          <button class="btn btn-fill btn-success" type="submit">
            Actualizar
          </button>
        </div>
      </div>
      <div class="card">

                  </div>
                </div>
              </div>
              <div class="card-footer">
                <hr />

                <div class="stats">
                  <button class="btn btn-simple btn-info btn-sm" type="submit">
                    <i class="tim-icons icon-double-right"> </i> Ingresar</button>
                </div>

            </div>
          </div>
          <div class="col-lg-4 col-md-5">
            <div class="card card-stats">
              <div class="card-body">
                <div class="row">
                  <div class="col-5">
                    <div class="info-icon text-center icon-danger">
                      <i class="tim-icons icon-molecule-40"> </i>
                    </div>
                  </div>
                  <div class="col-7">
                    <div class="numbers">
                      <p class="card-category">Curso</p>

                    </div>
                  </div>
                </div>
              </div>
              <div class="card-footer">
                <hr />

                <div class="stats">
                  
                  <button class="btn btn-simple btn-info btn-sm" type="submit">
                    <i class="tim-icons icon-double-right"> </i> Ingresar</button>

              </div>
            </div>
          </div>
        </div>
          
        </div>
        <div class="card-footer">
          <!--<button class="btn btn-fill btn-success" type="submit">
            Actualizar
          </button>-->
        </div>
      </div>
      
    </div>
    <div class="col-md-4">
      <div class="card card-user">
        <div class="card-body">
          <p class="card-text"></p>
          <div class="author">
            <div class="block block-one"></div>
            <div class="block block-two"></div>
            <div class="block block-three"></div>
            <div class="block block-four"></div>
            <a href="javascript:void(0)">
              <img alt="..." class="avatar" src="assets/img/emilyz.jpg" />

              <h5 class="title"> {{first_name.value}} {{last_name.value}} </h5>
            </a>
            <p class="description">{{rol}}</p>

          <div class="card-description" style="text-align: center">

      </div>
    </div>
  </div>
</div>
