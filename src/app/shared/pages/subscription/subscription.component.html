<!-- <p>subscription works!</p> -->
<div class="content admin-area-page" [ngClass]="{'class-user' : userDataService?.userData$?.value?.rol === 'student'}">
    <div class="row admin-area-breadcrumb-row">
        <div class="col-12">
            <nav aria-label="Migas de pan">
                <ol class="breadcrumb bg-transparent mb-0 px-0">
                    <li class="breadcrumb-item text-primary">
                        <a routerLink="/home">Inicio</a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page">Subscripción</li>
                </ol>
            </nav>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <h3 class="title-table ">MI SUBSCRIPCIÓN</h3>
        </div>
        <div class="col-md-12">
            <div class="card card-user">
                <div class="card-header row">
                    <div class="col-12 ">
                        <img class="p-3 img"
                            [src]="logoStartAcademy"
                            alt="Start Academy">
                    </div>

                </div>
                <div class="card-body">
                    <ng-container *ngIf="role === 'none'; else elseTemplate">

                        <div class="row">
                            <div class="col-lg-7 col-md-5">
                                <div class=" card-stats">
                                    <div class="card-body">
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>
                                                        <!-- <i class="tim-icons icon-alert-circle-exc icon-success"></i> -->
                                                    </th>
                                                    <th>
                                                        <p class="h3 mb-2">Plan Academia</p>
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tr *ngFor="let item of featuresFull">
                                                <td>
                                                    <i [class]="item.icon"></i>
                                                </td>
                                                <td>
                                                    <p class="card-text">{{ item.title }}</p>
                                                </td>
                                            </tr>
                                        </table>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-5 col-md-5 text-center">


                                <h3 class="text-primary ">ACTUALIZAR MI PLAN Academia</h3>

                                <form action="https://www.coinpayments.net/index.php" method="post">
                                    <input type="hidden" name="cmd" value="_pay_simple">
                                    <input type="hidden" name="reset" value="1">
                                    <input type="hidden" name="merchant" value="9f135a6a18337044fc156365bb6e8855">
                                    <input type="hidden" name="item_name" value="Start Academy — Academia">
                                    <input type="hidden" name="item_desc" value="asd">
                                    <input type="hidden" name="currency" value="USD">
                                    <input type="hidden" name="amountf" value="285.99">
                                    <input type="hidden" name="want_shipping" value="0">
                                    <input type="hidden" name="success_url" [value]="coinpaymentsSuccessUrl">
                                    <input type="hidden" name="cancel_url" [value]="coinpaymentsCancelUrl">
                                    <input type="hidden" name="ipn_url" [value]="coinpaymentsIpnUrl">
                                    <input type="image" src="https://www.coinpayments.net/images/pub/buynow-grey.png"
                                        alt="Buy Now with CoinPayments.net">
                                </form>
                            </div>
                        </div>
                    </ng-container>
                    <ng-template #elseTemplate>

                        <div class="row">
                            <div class="col-lg-7 col-md-5">
                                <div class=" card-stats">
                                    <div class="card-body">
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>
                                                        <!-- <i class="tim-icons icon-alert-circle-exc icon-success"></i> -->
                                                    </th>
                                                    <th>
                                                        <p class="h3 mb-2">Plan VIP Academia</p>
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tr *ngFor="let item of featuresVIP">
                                                <td>
                                                    <i [class]="item.icon"></i>
                                                </td>
                                                <td>
                                                    <p class="card-text">{{ item.title }}</p>
                                                </td>
                                            </tr>
                                        </table>
                                    </div>
                                </div>
                            </div>
                            <div *ngIf="this.userDataService.userData$.value.subscription !== 'full'" class="col-lg-5 col-md-5 text-center">

                                <h3 class="text-primary ">ACTUALIZAR MI PLAN A AUTOGESTION VIP</h3>

                                <form action="https://www.coinpayments.net/index.php" method="post">
                                    <input type="hidden" name="cmd" value="_pay_simple">
                                    <input type="hidden" name="reset" value="1">
                                    <input type="hidden" name="merchant" value="9f135a6a18337044fc156365bb6e8855">
                                    <input type="hidden" name="item_name" value="Academia vip">
                                    <input type="hidden" name="item_desc" value="asd">
                                    <input type="hidden" name="currency" value="USD">
                                    <input type="hidden" name="amountf" value="293.99">
                                    <input type="hidden" name="want_shipping" value="0">
                                    <input type="hidden" name="success_url" [value]="coinpaymentsSuccessUrl">
                                    <input type="hidden" name="cancel_url" [value]="coinpaymentsCancelUrl">
                                    <input type="hidden" name="ipn_url" [value]="coinpaymentsIpnUrl">
                                    <input type="image" src="https://www.coinpayments.net/images/pub/buynow-grey.png"
                                        alt="Buy Now with CoinPayments.net">
                                </form>
                            </div>
                        </div>

                    </ng-template>
                </div>
            </div>
        </div>
    </div>
</div>
