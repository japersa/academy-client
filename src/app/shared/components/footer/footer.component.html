<footer
  class="app-footer"
  [ngClass]="{ 'app-footer--student': userDataService?.userData$?.value?.rol === 'student' }"
>
  <div class="container-fluid app-footer__inner">
    <div class="row align-items-center justify-content-between gy-3">
      <div class="col-12 col-md-6 text-center text-md-start">
        <a
          routerLink="/referrals"
          class="app-footer__brand d-inline-block"
          title="Back office — Start Academy"
        >
          <img
            class="app-footer__logo"
            src="https://res.cloudinary.com/ddw7odxzr/image/upload/v1719765038/RC_11326_Logo_Final_Start_Academy_Alex_Logotipo_Positivo_detuei.png"
            alt="Start Academy"
            width="120"
            height="auto"
          />
        </a>
      </div>
      <div class="col-12 col-md-6">
        <nav class="app-footer__social" aria-label="Redes sociales">
          <a
            class="app-footer__social-link"
            href="https://www.instagram.com/startacademy.digital"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Start Academy en Instagram"
          >
            <i class="fab fa-instagram" aria-hidden="true"></i>
          </a>
        </nav>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <p class="app-footer__copy text-center mb-0">
          &copy; {{ currentYear }}
          <span class="app-footer__sep">·</span>
          Hecho con
          <i class="tim-icons icon-heart-2 app-footer__heart" aria-hidden="true"></i>
          <span class="app-footer__sep">·</span>
          <a
            href="https://startacademy.digital/"
            target="_blank"
            rel="noopener noreferrer"
            class="app-footer__site-link"
          >
            Start Academy
          </a>
        </p>
      </div>
    </div>
  </div>
</footer>
